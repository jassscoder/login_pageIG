<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Sora:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
</head>
<body>
    <div class="ambient-layer" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
    </div>

    <div class="app-shell">
        <header class="feed-header">
            <div class="header-content">
                <h1 class="feed-title">Instagram</h1>

                <label class="search-wrap" for="feedSearch">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input id="feedSearch" type="text" placeholder="Search people or captions" autocomplete="off">
                </label>

                <div class="header-actions">
                    <button class="icon-btn" id="notificationBtn" title="Notifications" aria-label="Notifications">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                    </button>
                    <button class="icon-btn" id="messageBtn" title="Messages" aria-label="Messages">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </button>
                    <button class="icon-btn" id="themeToggleBtn" title="Toggle theme" aria-label="Toggle theme">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                    <button class="profile-btn" id="profileBtn" title="Profile" aria-label="Profile">
                        <span class="profile-avatar" id="userInitial">U</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <nav class="sidebar-nav" id="sidebarNav">
                    <button class="nav-item active" data-view="home" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                        </svg>
                        <span>Home</span>
                    </button>
                    <button class="nav-item" data-view="explore" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <span>Explore</span>
                    </button>
                    <button class="nav-item" data-view="liked" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                        <span>Liked</span>
                    </button>
                    <button class="nav-item" data-view="saved" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>Saved</span>
                    </button>
                    <button class="nav-item" data-view="friends" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span>Friends</span>
                    </button>
                </nav>

                <button class="logout-btn" id="logoutBtn" title="Logout" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </aside>

            <main class="feed-container">
                <section class="feed-content">
                    <div class="stories-section" id="storiesSection"></div>
                    <div class="feed-state" id="feedStateText">Showing home feed</div>
                    <div class="posts-section" id="feedPosts"></div>
                </section>

                <aside class="sidebar-right">
                    <section class="profile-chip">
                        <span class="profile-chip-avatar" id="profileChipInitial">U</span>
                        <div>
                            <p class="profile-chip-username" id="profileChipUsername">username</p>
                            <p class="profile-chip-name" id="profileChipName">Instagram User</p>
                        </div>
                    </section>

                    <section class="suggested-users">
                        <div class="suggested-header">
                            <h3>Suggested for you</h3>
                            <button type="button" class="see-all-btn" id="seeAllSuggestions">See all</button>
                        </div>
                        <div class="suggested-list" id="suggestedList"></div>
                    </section>
                </aside>
            </main>
        </div>
    </div>

    <div id="profileModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content profile-modal-content">
            <button class="modal-close" id="closeProfileModalBtn" type="button">x</button>
            <div class="profile-modal-header">
                <div class="profile-large-avatar" id="profileInitial">U</div>
                <div class="profile-info">
                    <h2 id="profileUsername">username</h2>
                    <p id="profileFullName">Full Name</p>
                    <p class="profile-email" id="profileEmail">email@example.com</p>
                </div>
            </div>
            <div class="profile-modal-actions">
                <button class="edit-profile-btn" id="editProfileBtn" type="button">Edit Profile</button>
                <button class="logout-modal-btn" id="logoutModalBtn" type="button">Logout</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="dashboard.js?v=2.0" defer></script>
</body>
</html>
