<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="introOverlay" class="intro-overlay" aria-hidden="true">
        <div class="intro-mark-wrap">
            <div class="intro-mark-ring"></div>
            <img src="image/Instagram-logo-3.webp" alt="Brand mark" class="intro-mark">
            <div class="intro-light-sweep"></div>
        </div>
        <p class="intro-copy">Frame your story.</p>
    </div>

    <div class="ambient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grain"></div>
    </div>

    <main class="container page-enter" id="pageRoot">
        <header class="header">
            <div class="brand-pill">
                <span class="dot"></span>
                Social Lens
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
                <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <section class="content-wrapper">
            <article class="login-card" aria-label="Login card">
                <div class="logo-container stagger-1">
                    <img src="image/Instagram-logo-3.webp" alt="Instagram" class="logo">
                </div>

                <div class="welcome stagger-2">
                    <h1>Welcome back</h1>
                    <p>Catch up with your people in seconds.</p>
                </div>

                <form id="loginForm" class="form stagger-3">
                    <div class="form-group">
                        <label for="emailUsername">Email, phone or username</label>
                        <input 
                            type="text" 
                            id="emailUsername" 
                            class="form-input" 
                            placeholder="you@example.com"
                            required
                        >
                        <span class="error-text" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-group">
                            <input 
                                type="password" 
                                id="password" 
                                class="form-input" 
                                placeholder="Password"
                                required
                            >
                            <button type="button" class="eye-button" onclick="togglePassword()" aria-label="Toggle password visibility">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                        <span class="error-text" id="passwordError"></span>
                    </div>

                    <button type="submit" class="btn-login" id="loginButton">
                        <span class="btn-label">Log in</span>
                        <span class="story-loader" aria-hidden="true"></span>
                    </button>

                    <span class="status-text" id="statusText"></span>
                    <span class="error-text form-error" id="formError"></span>
                    <span class="success-text" id="formSuccess"></span>
                </form>

                <div class="forgot-section stagger-4">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <div class="divider-line stagger-4"></div>

                <div class="signup-section stagger-4">
                    <p>Don't have an account? <a href="#" id="signupLink" class="signup-link">Sign up</a></p>
                </div>
            </article>

            <footer class="footer-links stagger-4">
                <a href="#">About</a>
                <a href="#">Help</a>
                <a href="#">Press</a>
                <a href="#">API</a>
                <a href="#">Jobs</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Locations</a>
                <a href="#">Language</a>
            </footer>
        </section>
    </main>

    <div id="signupModal" class="modal hidden">
        <div class="modal-card">
            <button class="modal-close" onclick="closeSignupModal()">x</button>
            <div class="modal-header">
                <h3>Create Account</h3>
            </div>
            <form id="signupForm" class="form">
                <div class="form-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="script.js?v=3.0" defer></script>
</body>
</html>
