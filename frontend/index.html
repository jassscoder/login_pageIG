<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header with Theme Toggle -->
        <div class="header">
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <!-- Login Card -->
            <div class="login-card">
                <!-- Logo -->
                <div class="logo-container">
                    <img src="image/Instagram-logo-3.webp" alt="Instagram" class="logo">
                </div>

                <!-- Welcome Message -->
                <div class="welcome">
                    <h2>Log in to Instagram</h2>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="form">
                    <!-- Email/Username Input -->
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="emailUsername" 
                            class="form-input" 
                            placeholder="Email, phone or username"
                            required
                        >
                        <span class="error-text" id="emailError"></span>
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <div class="password-group">
                            <input 
                                type="password" 
                                id="password" 
                                class="form-input" 
                                placeholder="Password"
                                required
                            >
                            <button type="button" class="eye-button" onclick="togglePassword()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                        <span class="error-text" id="passwordError"></span>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn-login">Log in</button>

                    <!-- Form Messages -->
                    <span class="error-text form-error" id="formError"></span>
                    <span class="success-text" id="formSuccess"></span>
                </form>

                <!-- Forgot Password -->
                <div class="forgot-section">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <!-- Divider -->
                <div class="divider-line"></div>

                <!-- Sign Up Link -->
                <div class="signup-section">
                    <p>Don't have an account? <a href="#" id="signupLink" class="signup-link">Sign up</a></p>
                </div>
            </div>

            <!-- Footer Links -->
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Help</a>
                <a href="#">Press</a>
                <a href="#">API</a>
                <a href="#">Jobs</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Locations</a>
                <a href="#">Language</a>
            </div>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div id="signupModal" class="modal hidden">
        <div class="modal-card">
            <button class="modal-close" onclick="closeSignupModal()">×</button>
            <div class="modal-header">
                <h3>Create Account</h3>
            </div>
            <form id="signupForm" class="form">
                <div class="form-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="script.js?v=2.0" defer></script>
</body>
</html>
